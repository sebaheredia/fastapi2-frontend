# ╔══════════════════════════════════════════════════════════════╗
# ║                        nginx.conf                            ║
# ║   Configuracion del servidor web nginx que sirve el          ║
# ║   frontend React en produccion.                              ║
# ║                                                              ║
# ║   nginx recibe los archivos estaticos compilados por         ║
# ║   npm run build (HTML, CSS, JS) y los entrega al navegador.  ║
# ║                                                              ║
# ║   El Dockerfile copia este archivo al contenedor:            ║
# ║   COPY nginx.conf /etc/nginx/conf.d/default.conf             ║
# ╚══════════════════════════════════════════════════════════════╝

server {
    # Un bloque server define un "sitio virtual".
    # En este caso hay uno solo, que atiende todas las peticiones.

    listen 80;
    # nginx escucha conexiones entrantes en el puerto 80 (HTTP estandar).
    # Render mapea automaticamente este puerto a su infraestructura
    # HTTPS publica. El usuario accede por HTTPS pero internamente
    # el contenedor usa HTTP en el puerto 80.

    root /usr/share/nginx/html;
    # Directorio base donde estan los archivos estaticos.
    # El Dockerfile copia ahi el resultado de npm run build:
    #   COPY --from=builder /app/build /usr/share/nginx/html
    # Cuando alguien pide /main.js, nginx lo busca en
    # /usr/share/nginx/html/main.js

    index index.html;
    # Archivo que se sirve cuando alguien accede a un directorio.
    # React genera un unico index.html que carga toda la aplicacion.
    # Cuando el usuario entra a la raiz /, nginx sirve index.html.


    # ── Regla principal ─────────────────────────────────────────
    location / {
        # Esta regla aplica a TODAS las rutas que no matcheen
        # ninguna otra regla mas especifica.

        try_files $uri $uri/ /index.html;
        # try_files intenta servir el archivo pedido en este orden:
        #
        # 1. $uri      → busca el archivo exacto en disco
        #                Ej: /logo.png → busca /usr/share/nginx/html/logo.png
        #
        # 2. $uri/     → busca si es un directorio con ese nombre
        #                Ej: /assets/ → busca la carpeta assets/
        #
        # 3. /index.html → si no encontro nada, siempre sirve index.html
        #
        # El tercer paso es CRITICO para React.
        # React es una Single Page Application (SPA): toda la navegacion
        # ocurre en el navegador sin recargar la pagina. Las "rutas"
        # como /usuarios o /perfil no son archivos reales en disco,
        # solo existen en la logica de React.
        #
        # Sin esta regla:
        #   Usuario escribe /usuarios en el navegador
        #   nginx busca el archivo /usuarios → no existe → devuelve 404
        #
        # Con esta regla:
        #   Usuario escribe /usuarios en el navegador
        #   nginx no encuentra el archivo → sirve index.html
        #   React carga, lee /usuarios de la URL, y muestra la vista correcta
    }


    # ── Cache de archivos estaticos ──────────────────────────────
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg)$ {
        # ~*  → la regla usa expresion regular, sin distinguir mayusculas
        # \.  → punto literal (en regex el punto sin escapar = cualquier caracter)
        # (js|css|...) → cualquiera de estas extensiones
        # $   → al final del nombre del archivo
        #
        # Esta regla aplica a todos los archivos con estas extensiones:
        # JavaScript, CSS, imagenes, iconos, vectores.

        expires 1y;
        # Le dice al navegador que guarde estos archivos en cache por 1 año.
        # La proxima vez que el usuario visita el sitio, el navegador
        # usa su copia local en lugar de descargarlos de nuevo.
        # Esto hace la carga inicial mucho mas rapida en visitas posteriores.

        add_header Cache-Control "public, immutable";
        # Agrega el header HTTP Cache-Control a la respuesta.
        #
        # public    → el archivo puede ser cacheado por proxies y CDNs
        #             intermedios entre el servidor y el usuario, ademas
        #             del navegador del usuario.
        #
        # immutable → le dice al navegador que el archivo NUNCA va a cambiar
        #             mientras no expire el cache. Evita que el navegador
        #             haga requests de verificacion ("sigue siendo el mismo archivo?")
        #             durante el año de cache.
        #
        # Esto funciona de forma segura porque React genera nombres de archivo
        # unicos con hash en cada build:
        #   main.3f2a1b.js  (build actual)
        #   main.9c4d7e.js  (proximo build con cambios)
        # Si el codigo cambia, el nombre del archivo cambia. El navegador
        # ve un nombre nuevo y descarga el archivo nuevo automaticamente,
        # sin importar el cache del anterior.
    }
}
