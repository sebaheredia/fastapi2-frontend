name: CI/CD Frontend

on:
  push:
    branches:
      - main
      - develop

jobs:

  # ─────────────────────────────────────────────
  # JOB 1: Build y push de la imagen Docker a GHCR
  # El frontend no tiene tests de lógica —
  # el build de React ya valida que el código compila
  # ─────────────────────────────────────────────
  docker:
    name: Build y push Docker
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:

      - name: Checkout del código
        uses: actions/checkout@v4

      - name: Login a GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Generar tags de la imagen
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository }}
          tags: |
            type=ref,event=branch

      - name: Configurar Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build y push de la imagen
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          # La URL del backend se inyecta en tiempo de build
          # React la incluye en el bundle compilado
          build-args: |
            REACT_APP_API_URL=${{ github.ref == 'refs/heads/main' && secrets.BACKEND_PRODUCTION_URL || secrets.BACKEND_STAGING_URL }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ─────────────────────────────────────────────
  # JOB 2: Deploy a Staging
  # Solo corre si el push fue a develop
  # ─────────────────────────────────────────────
  deploy-staging:
    name: Deploy a Staging
    runs-on: ubuntu-latest
    needs: docker
    if: github.ref == 'refs/heads/develop'

    steps:

      - name: Actualizar imagen en Render (staging)
        run: |
          curl -s -X PATCH \
            "https://api.render.com/v1/services/${{ secrets.RENDER_FRONTEND_STAGING_SERVICE_ID }}/image" \
            -H "Authorization: Bearer ${{ secrets.RENDER_API_KEY }}" \
            -H "Content-Type: application/json" \
            -d '{
              "image": {
                "url": "ghcr.io/${{ github.repository }}:develop",
                "credentials": {
                  "username": "${{ github.actor }}",
                  "password": "${{ secrets.GHCR_TOKEN }}"
                }
              }
            }'

      - name: Triggerear deploy en Render (staging)
        run: |
          curl -s -o /dev/null -w "%{http_code}" \
            -X POST \
            "https://api.render.com/v1/services/${{ secrets.RENDER_FRONTEND_STAGING_SERVICE_ID }}/deploys" \
            -H "Authorization: Bearer ${{ secrets.RENDER_API_KEY }}" \
            -H "Content-Type: application/json" | grep -q "200\|201\|202"

  # ─────────────────────────────────────────────
  # JOB 3: Deploy a Producción
  # Solo corre si el push fue a main
  # ─────────────────────────────────────────────
  deploy-production:
    name: Deploy a Producción
    runs-on: ubuntu-latest
    needs: docker
    if: github.ref == 'refs/heads/main'

    steps:

      - name: Actualizar imagen en Render (producción)
        run: |
          curl -s -X PATCH \
            "https://api.render.com/v1/services/${{ secrets.RENDER_FRONTEND_PRODUCTION_SERVICE_ID }}/image" \
            -H "Authorization: Bearer ${{ secrets.RENDER_API_KEY }}" \
            -H "Content-Type: application/json" \
            -d '{
              "image": {
                "url": "ghcr.io/${{ github.repository }}:main",
                "credentials": {
                  "username": "${{ github.actor }}",
                  "password": "${{ secrets.GHCR_TOKEN }}"
                }
              }
            }'

      - name: Triggerear deploy en Render (producción)
        run: |
          curl -s -o /dev/null -w "%{http_code}" \
            -X POST \
            "https://api.render.com/v1/services/${{ secrets.RENDER_FRONTEND_PRODUCTION_SERVICE_ID }}/deploys" \
            -H "Authorization: Bearer ${{ secrets.RENDER_API_KEY }}" \
            -H "Content-Type: application/json" | grep -q "200\|201\|202"
